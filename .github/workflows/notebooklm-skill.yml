name: notebooklm-skill

on:
  pull_request:
    paths:
      - "skills/notebooklm/**"
      - ".github/workflows/notebooklm-skill.yml"
  push:
    branches:
      - main
    paths:
      - "skills/notebooklm/**"
      - ".github/workflows/notebooklm-skill.yml"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/notebooklm/requirements.txt pytest

      - name: Compile scripts
        run: |
          python -m py_compile skills/notebooklm/scripts/*.py

      - name: Run tests
        run: |
          pytest -q skills/notebooklm/tests
